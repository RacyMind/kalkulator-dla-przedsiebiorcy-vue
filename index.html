    <% if (process.env.VITE_GA_MEASUREMENT_ID && !ctx.mode.capacitor && !ctx.mode.cordova) { %>
    <script>
      window.dataLayer = window.dataLayer || []
      function gtag(){dataLayer.push(arguments)}
      window.gtag = gtag
      gtag('js', new Date())

      const consentStorageKey = 'kf-consent-v1'
      const getStoredAnalyticsConsent = () => {
        try {
          const rawConsent = localStorage.getItem(consentStorageKey)
          if (!rawConsent) {
            return null
          }
          const parsedConsent = JSON.parse(rawConsent)
          return parsedConsent?.analyticsStorage ?? null
        } catch {
          return null
        }
      }

      const defaultConsentState = {
        analytics_storage: 'denied',
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
      }

      const updateAnalyticsConsent = (decision) => {
        if (decision !== 'granted' && decision !== 'denied') {
          return
        }

        gtag('consent', 'update', {
          ...defaultConsentState,
          analytics_storage: decision,
        })
      }

      let hasRequestedGaScript = false
      const loadGaScriptOnce = () => {
        if (hasRequestedGaScript) {
          return
        }

        hasRequestedGaScript = true
        const script = document.createElement('script')
        script.async = true
        script.src = 'https://www.googletagmanager.com/gtag/js?id=<%= process.env.VITE_GA_MEASUREMENT_ID %>'
        document.head.appendChild(script)
      }

      const scheduleGaScriptLoad = () => {
        const loadWhenIdle = () => {
          if ('requestIdleCallback' in window) {
            window.requestIdleCallback(() => {
              loadGaScriptOnce()
            }, { timeout: 3000 })
            return
          }

          setTimeout(() => {
            loadGaScriptOnce()
          }, 0)
        }

        if (document.readyState === 'complete') {
          loadWhenIdle()
          return
        }

        window.addEventListener('load', loadWhenIdle, { once: true })
      }

      gtag('consent', 'default', defaultConsentState)

      const storedAnalyticsConsent = getStoredAnalyticsConsent()
      if (storedAnalyticsConsent === 'granted' || storedAnalyticsConsent === 'denied') {
        updateAnalyticsConsent(storedAnalyticsConsent)
      }

      gtag('config', '<%= process.env.VITE_GA_MEASUREMENT_ID %>', {
        anonymize_ip: true,
        allow_google_signals: false,
      })

      scheduleGaScriptLoad()
    </script>
    <% } %>
  </head>
  <body>
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('themeMode');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (stored === '"dark"' || ((!stored || stored === '"auto"') && prefersDark)) {
            document.body.classList.add('body--dark');
          }
        } catch(e) {}
      })();
    </script>
    <!-- quasar:entry-point -->
